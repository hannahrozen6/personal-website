[build]
  command = """
  bash -lc '
  QUARTO_VERSION=1.4.555
  curl -L "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz" -o quarto.tar.gz
  mkdir -p $HOME/quarto
  tar -xzf quarto.tar.gz -C $HOME/quarto --strip-components=1
  export PATH="$HOME/quarto/bin:$PATH"
  quarto --version
  quarto render
  '
  """
  publish = "_site"